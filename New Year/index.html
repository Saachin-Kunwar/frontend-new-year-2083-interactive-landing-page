<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy New Year 2083</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Fireworks Canvas -->
    <canvas id="fireworks"></canvas>

    <!-- Greeting -->
    <section class="greeting">
        <h1>Happy New Year</h1>
    </section>

    <!-- Banner -->
    <section class="banner">
        <h2>2083</h2>
    </section>

    <!-- Old Year -->
    <section class="context">
        <h2>2082</h2>
    </section>

    <!-- Signature -->
    <div class="signature">
        <svg viewBox="0 0 500 100">
            <text x="50%" y="60%" text-anchor="middle">Saachin</text>
        </svg>
    </div>



    <!-- JS FILE -->
    <script src="script.js"></script>

</body>

</html>
